name: Integration Tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    paths:
      - '.github/**'
      - 'cmd/**'
      - 'api/**'
      - 'internal/**'
      - 'config/**'
      - 'hack/**'
      - 'test/**'
      - 'Dockerfile'
      - 'Dockerfile.konflux'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'

env:
  OPERATOR_IMG: "localhost/llm-d-batch-gateway-operator:ci"
  KIND_CLUSTER_NAME: "batch-gateway-ci"

jobs:
  integration-tests:
    name: Integration Tests (${{ matrix.dev_profile }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - dev_profile: sync
          - dev_profile: async
          - dev_profile: async-gate-redis
          - dev_profile: async-gate-prometheus-query
          - dev_profile: async-gate-prometheus-budget
          - dev_profile: async-gate-endpoint-scrape
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Install Kind
        run: go install sigs.k8s.io/kind@latest

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Install yq
        run: go install github.com/mikefarah/yq/v4@latest

      - name: Deploy dev environment
        run: make dev-deploy
        env:
          OPERATOR_IMG: ${{ env.OPERATOR_IMG }}
          KIND_CLUSTER_NAME: ${{ env.KIND_CLUSTER_NAME }}
          DEV_PROFILE: ${{ matrix.dev_profile }}

      - name: Validate sample CRs against CRD schema
        run: |
          for f in config/samples/batch_v1alpha1_*.yaml; do
            echo "Validating $f..."
            kubectl apply --dry-run=server -f "$f"
          done

      - name: Run batch-gateway e2e tests
        run: make test-e2e-batch-gateway
        env:
          TEST_APISERVER_URL: "http://localhost:8000"

      - name: Run operator e2e tests
        run: make test-e2e-operator

      - name: Cleanup
        if: always()
        run: kind delete cluster --name ${{ env.KIND_CLUSTER_NAME }}
