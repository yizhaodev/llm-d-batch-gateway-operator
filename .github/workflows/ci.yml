name: CI

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - '.github/**'
      - 'cmd/**'
      - 'api/**'
      - 'internal/**'
      - 'batch-gateway/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify generated code is up to date
        run: |
          make generate manifests
          git diff --exit-code -- api/ config/crd/

      - name: Build
        run: make build

      - name: Test
        run: make test
