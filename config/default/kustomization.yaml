apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: batch-gw-operator-system

namePrefix: batch-gw-operator-

resources:
- ../crd
- ../rbac
- ../manager
- metrics_service.yaml

patches:
- path: manager_metrics_patch.yaml
  target:
    kind: Deployment
images:
- name: controller
  newName: localhost/batch-gw-operator
  newTag: dev
