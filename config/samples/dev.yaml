apiVersion: batch.llm-d.ai/v1alpha1
kind: LLMBatchGateway
metadata:
  name: batch-gateway-dev
spec:
  secretRef:
    name: batch-gateway-secrets
  dbBackend: postgresql
  fileStorage:
    s3:
      region: us-east-1
      endpoint: http://minio.default.svc.cluster.local:9000
      accessKeyId: minioadmin
      usePathStyle: true
      autoCreateBucket: true
  apiServer:
    replicas: 1
    imagePullPolicy: IfNotPresent
  processor:
    replicas: 1
    imagePullPolicy: IfNotPresent
    globalInferenceGateway:
      url: http://vllm-sim.default.svc.cluster.local:8000
      requestTimeout: 5m
      maxRetries: 3
      initialBackoff: 1s
      maxBackoff: 60s
    dispatchMode: async
    asyncConfig:
      replicas: 1
      concurrency: 8
      drainTimeout: 2m
      inferenceGateway:
        url: http://epp.default.svc:8081
      redis:
        requestQueueName: request-sortedset
        resultQueueName: result-list
        requestPathURL: /v1/completions
        pollIntervalMs: 1000
        batchSize: 10
  gc:
    interval: 30m
    imagePullPolicy: IfNotPresent
